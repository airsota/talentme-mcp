<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <!-- Lightning bolt gradient (Amber to Yellow) -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" /> <!-- Yellow-300 -->
      <stop offset="100%" stop-color="#F59E0B" /> <!-- Amber-500 -->
    </linearGradient>
  </defs>
  
  <!-- Dark Slate Background Container matching the website -->
  <rect width="100%" height="100%" rx="12" fill="#0B0F17" />
  
  <!-- Lightning Bolt Icon -->
  <g transform="translate(24, 0)">
    <path d="M 46 16 L 24 45 L 35 45 L 21 68 L 52 35 L 39 35 Z" fill="url(#boltGrad)" />
  </g>
  
  <!-- "TalentMe" Brand Text -->
  <text x="92" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">TalentMe</text>
</svg>
